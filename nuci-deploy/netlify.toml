[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Homepage = landing page
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

# App entry (Get started / Login point here via index.html?...)
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

# Clean URL for landing
[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200
